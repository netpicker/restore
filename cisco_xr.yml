.transfer-prompts: &prompts
  "Destination filename": ""
  "Destination file": ""
  "Proceed": ""
  "confirm": ""
  "Do you want to overwrite": "y"
  "Overwrite": "y"
  "overwrite": "y"
  "Are you sure you want to continue connecting": "yes"
  "Are you sure you want to continue": "yes"
  "Password": "{password}"
  "password": "{password}"

verify:
  - command: "show md5 file {dst_file}"
    prompts:
      "{md5}": true

transfers:
  scp:
    - command: "copy scp://{username}@{src_ip}/{src_file} {dst_file}"
      prompts:
        <<: *prompts
      kwargs:
        read_timeout: 180
        last_read: 10

  tftp:
    - command: "copy tftp://{src_ip}/{src_file} {dst_file}"
      prompts:
        <<: *prompts
      kwargs:
        read_timeout: 120
        last_read: 10

errors:
  kibbitzer.exceptions.FileTransferError:
    - No such file or directory
    - No such file
    - Error opening
    - Transfer failed
    - transfer failed
    - Copy failed
    - copy failed
    - Permission denied
    - permission denied
    - Connection refused
    - No route to host
    - timed out
    - Timed out
    - "%Error"
    - "% Error"
    - "% File not found"
    - checksum does not match
    - digest does not match

  kibbitzer.exceptions.InvalidCommand:
    - "^% (.*)"
    - "^Invalid input"
    - "^Incomplete command"
    - "^Ambiguous command"
    - "Invalid input detected"
    - "syntax error"
