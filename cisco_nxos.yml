.transfer-prompts: &prompts
  "Enter vrf": ""
  "Destination filename": ""
  "Destination file": ""
  "Do you want to overwrite": "y"
  "Overwrite": "y"
  "password:": "{password}"
verify:
  - command: "show file {dst_file} md5sum"
    prompts:
      "{md5}": true
transfers:
  tftp:
    - command: "copy tftp://{src_ip}/{src_file} {dst_file}"
      prompts:
        <<: *prompts
  scp:
    - command: "copy scp://{username}:{password}@{src_ip}/{src_file} {dst_file}"
      prompts:
        <<: *prompts
        "Are you sure you want to continue": "yes"
        "Enter username": "{username}"
        "Password": "{password}"
        "password": "{password}"
      kwargs:
        read_timeout: 120
        last_read: 10
errors:
  kibbitzer.exceptions.FileTransferError:
    - No such file or directory
    - Error opening
    - Transfer failed
    - Permission denied
    - "% File not found"
    - "% Invalid"
    - Copy failed
    - No route to host
    - Connection refused
    - Timed out
  kibbitzer.exceptions.InvalidCommand:
    - "^% (.*)"
    - "^ERROR: (.*)"
